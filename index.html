<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Face Scan Full Screen</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Kanit', sans-serif; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { transform: scaleX(-1); }
        canvas { transform: scaleX(-1); z-index: 5; }
        
        #status { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.6); color: white; padding: 8px 20px; border-radius: 10px; font-size: 14px; pointer-events: none; }

        /* ชื่อคนสแกนผ่าน ปรับให้เด่นและอยู่ตรงกลางบน */
        #name-display { 
            position: absolute; 
            top: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 20; 
            background: rgba(0, 180, 0, 0.9); 
            color: white; 
            padding: 15px 50px; 
            border-radius: 60px; 
            font-size: 40px; 
            font-weight: bold; 
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 4px solid #fff;
            text-align: center;
            min-width: 300px;
        }
    </style>
</head>
<body>
    <div id="status">⏳ กำลังเชื่อมต่อฐานข้อมูล...</div>
    <div id="name-display"></div>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyh2P0KBa9caub2E0QHSt0f0BdmRVJo_zhICFRjuCy-628GkTcV0n8H-IpNsYyQxBUnRQ/exec"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        const nameDisplay = document.getElementById('name-display');
        let knownFaces = [];
        let nameTimeout;

        window.onload = async () => {
            try {
                const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
                status.innerText = "⏳ โหลด AI Model...";
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                status.innerText = "⏳ ดึงข้อมูลพนักงาน...";
                const response = await fetch(WEB_APP_URL + "?action=getFaces");
                const data = await response.json();
                
                knownFaces = data.map(u => ({ 
                    label: u.label, 
                    descriptor: new Float32Array(u.descriptor) 
                }));
                
                status.innerText = "✅ พร้อมใช้งาน (ตรวจสอบใบหน้า...)";
                initCamera();
            } catch (e) {
                status.innerText = "❌ เกิดข้อผิดพลาด: " + e.message;
            }
        };

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "❌ ไม่สามารถเข้าถึงกล้องได้";
            }
        }

        // เมื่อวิดีโอเริ่มเล่น ให้เริ่มสแกน
        video.onplay = () => {
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, displaySize);

            // สร้าง FaceMatcher ครั้งเดียว
            const faceMatcher = new faceapi.FaceMatcher(knownFaces.map(f => 
                new faceapi.LabeledFaceDescriptors(f.label, [f.descriptor])
            ), 0.55); // 0.55 ยิ่งน้อยยิ่งแม่นยำ

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video)
                    .withFaceLandmarks()
                    .withFaceDescriptors();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                resizedDetections.forEach(detection => {
                    const result = faceMatcher.findBestMatch(detection.descriptor);
                    
                    // แปลงค่า distance เป็นเปอร์เซ็นต์ (ความเหมือน)
                    const matchPercent = Math.round((1 - result.distance) * 100);
                    const color = result.label !== 'unknown' ? '#00FF00' : '#FF0000';
                    
                    // วาดกรอบสแกน
                    const drawBox = new faceapi.draw.DrawBox(detection.detection.box, { 
                        label: `${result.label} (${matchPercent}%)`,
                        lineWidth: 5,
                        boxColor: color,
                        drawLabelOptions: {
                            fontSize: 25,
                            fontStyle: 'bold',
                            fontColor: '#ffffff',
                            backgroundColor: 'rgba(0,0,0,0.8)' // พื้นหลังป้ายชื่อให้ดำเข้มเพื่อให้อักษรขาวชัด
                        }
                    });
                    drawBox.draw(canvas);

                    // แสดงชื่อด้านบนเมื่อความแม่นยำ > 45% (ปรับได้)
                    if (result.label !== 'unknown' && matchPercent > 45) {
                        showNameHeader(result.label, matchPercent);
                    }
                });
            }, 150); // ความเร็วในการสแกน (150ms)
        };

        function showNameHeader(name, percent) {
            nameDisplay.innerHTML = `<div>${name}</div><div style="font-size:20px">ความแม่นยำ ${percent}%</div>`;
            nameDisplay.style.display = "block";
            
            clearTimeout(nameTimeout);
            nameTimeout = setTimeout(() => {
                nameDisplay.style.display = "none";
            }, 2500); 
        }
    </script>
</body>
</html>
