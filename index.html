<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Face Scan Full Screen</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { transform: scaleX(-1); }
        canvas { transform: scaleX(-1); z-index: 5; }
        #status { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.8); color: white; padding: 10px 25px; border-radius: 30px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="overlay"></canvas>

        const canvas = document.getElementById('overlay');

                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                    label: u.label, 
                    descriptor: new Float32Array(u.descriptor) 
                }));
