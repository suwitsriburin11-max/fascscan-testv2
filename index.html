<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Face Scan Full Screen</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Kanit', sans-serif; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { transform: scaleX(-1); }
        canvas { transform: scaleX(-1); z-index: 5; }
        
        /* แถบสถานะเดิม */
        #status { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.6); color: white; padding: 8px 20px; border-radius: 10px; font-size: 14px; pointer-events: none; }

        /* ส่วนแสดงชื่อคนสแกนผ่าน กลางจอ ด้านบน */
        #name-display { 
            position: absolute; 
            top: 50px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 15; 
            background: rgba(0, 255, 0, 0.85); 
            color: black; 
            padding: 15px 40px; 
            border-radius: 50px; 
            font-size: 32px; 
            font-weight: bold; 
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะเจอ */
            box-shadow: 0 0 20px rgba(0,255,0,0.5);
            border: 3px solid white;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="status">⏳ กำลังเชื่อมต่อฐานข้อมูล...</div>
    <div id="name-display"></div> <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyh2P0KBa9caub2E0QHSt0f0BdmRVJo_zhICFRjuCy-628GkTcV0n8H-IpNsYyQxBUnRQ/exec"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        const nameDisplay = document.getElementById('name-display');
        let knownFaces = [];
        let nameTimeout;

        window.onload = async () => {
            try {
                const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
                status.innerText = "⏳ โหลด AI Model...";
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                status.innerText = "⏳ ดึงข้อมูลพนักงาน...";
                const response = await fetch(WEB_APP_URL + "?action=getFaces");
                const data = await response.json();
                
                knownFaces = data.map(u => ({ 
                    label: u.label, 
                    descriptor: new Float32Array(u.descriptor) 
                }));
                
                status.innerText = "✅ ระบบพร้อมใช้งาน";
                initCamera();
            } catch (e) {
                status.innerText = "❌ เชื่อมต่อล้มเหลว: " + e.message;
            }
        };

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            video.addEventListener('play', onPlay);
        }

        async function onPlay() {
            const faceMatcher = new faceapi.FaceMatcher(knownFaces.map(f => 
                new faceapi.LabeledFaceDescriptors(f.label, [f.descriptor])
            ), 0.6); // ค่า Threshold 0.6 (ปรับให้น้อยลงถ้าอยากให้แม่นขึ้น)

            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video)
                    .withFaceLandmarks()
                    .withFaceDescriptors();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                resizedDetections.forEach(detection => {
                    const result = faceMatcher.findBestMatch(detection.descriptor);
                    
                    // ปรับแต่งการวาดกรอบ
                    const box = detection.detection.box;
                    const drawBox = new faceapi.draw.DrawBox(box, { 
                        label: result.toString(), // จะแสดงเป็น "Name (distance)"
                        lineWidth: 4,
                        boxColor: result.label !== 'unknown' ? '#00FF00' : '#FF0000',
                        drawLabelOptions: {
                            fontSize: 20, // ปรับขนาดตัวเลข/ชื่อบนกรอบให้ใหญ่ขึ้น
                            fontStyle: 'bold',
                            backgroundColor: 'rgba(0,0,0,0.7)' // พื้นหลังตัวหนังสือให้มองชัด
                        }
                    });
                    drawBox.draw(canvas);

                    // ถ้าพบว่าเป็นคนที่รู้จัก และค่าความแม่นยำอยู่ในเกณฑ์
                    if (result.label !== 'unknown') {
                        showNameHeader(result.label);
                    }
                });
            }, 200);
        }

        function showNameHeader(name) {
            nameDisplay.innerText = "ยินดีต้อนรับ: " + name;
            nameDisplay.style.display = "block";
            
            // ล้าง timeout เก่าเพื่อให้ชื่อค้างไว้ถ้ายังสแกนอยู่
            clearTimeout(nameTimeout);
            nameTimeout = setTimeout(() => {
                nameDisplay.style.display = "none";
            }, 3000); // แสดงชื่อค้างไว้ 3 วินาทีหลังจากสแกนไม่เจอแล้ว
        }
    </script>
</body>
</html>
