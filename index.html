<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Face Scan Full Screen (High Precision)</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Kanit', sans-serif; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { transform: scaleX(-1); }
        canvas { transform: scaleX(-1); z-index: 5; }
        #status { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.6); color: white; padding: 8px 20px; border-radius: 10px; font-size: 14px; pointer-events: none; }

        #name-container { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            z-index: 20; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .name-toast { 
            background: rgba(0, 180, 0, 0.9); 
            color: white; 
            padding: 12px 25px; 
            border-radius: 15px; 
            font-size: 24px; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #fff;
            text-align: right;
            min-width: 220px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="status">⏳ กำลังเชื่อมต่อฐานข้อมูล...</div>
    <div id="name-container"></div>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyh2P0KBa9caub2E0QHSt0f0BdmRVJo_zhICFRjuCy-628GkTcV0n8H-IpNsYyQxBUnRQ/exec"; 
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const status = document.getElementById('status');
    const nameContainer = document.getElementById('name-container');
    
    let knownFaces = [];
    let lineCooldown = new Set();
    let activeNames = new Set();

    window.onload = async () => {
        try {
            status.innerText = "⏳ กำลังโหลด AI Model...";
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);

            status.innerText = "⏳ ดึงข้อมูลจาก Google Sheets...";
            const response = await fetch(WEB_APP_URL + "?action=getFaces");
            const data = await response.json();
            
            knownFaces = data.map(u => ({ 
                label: u.label, 
                descriptor: new Float32Array(u.descriptor) 
            }));
            
            status.innerText = "✅ พร้อมใช้งาน (พบ " + knownFaces.length + " รายชื่อ)";
            initCamera();
        } catch (e) {
            status.innerText = "❌ การเชื่อมต่อผิดพลาด: " + e.message;
        }
    };

    async function initCamera() {
        try {
            // ปรับความละเอียดกล้องเป็น Full HD (1920x1080) เพื่อความคมชัดสูงสุดในการวิเคราะห์ใบหน้า
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    facingMode: "user"
                } 
            });
            video.srcObject = stream;
        } catch (err) {
            // กรณีกล้องไม่รองรับ Full HD ให้ถอยลงมาเป็น HD ปกติ
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }
    }

    video.onplay = () => {
        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        faceapi.matchDimensions(canvas, displaySize);
        
        // [จุดเปลี่ยนสำคัญ 1] ปรับค่า Threshold เป็น 0.35 (เข้มงวดขึ้น ลดการจำผิดคน)
        const faceMatcher = new faceapi.FaceMatcher(knownFaces.map(f => 
            new faceapi.LabeledFaceDescriptors(f.label, [f.descriptor])
        ), 0.35);

        setInterval(async () => {
            // ใช้ SsdMobilenetv1 ร่วมกับค่า minConfidence ที่คัดกรองเฉพาะใบหน้าเน้นๆ
            const detections = await faceapi.detectAllFaces(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.6 }))
                                             .withFaceLandmarks()
                                             .withFaceDescriptors();
            
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            resizedDetections.forEach(detection => {
                const result = faceMatcher.findBestMatch(detection.descriptor);
                
                // คำนวณเปอร์เซ็นต์ความแม่นยำใหม่ ให้สัมพันธ์กับระบบคัดกรองที่เข้มงวดขึ้น
                const matchPercent = Math.round((1 - result.distance) * 100);
                const isKnown = result.label !== 'unknown';
                const color = isKnown ? '#00FF00' : '#FF0000';
                const box = detection.detection.box;

                // วาดกรอบสี่เหลี่ยมใบหน้า
                ctx.strokeStyle = color;
                ctx.lineWidth = 5;
                ctx.strokeRect(box.x, box.y, box.width, box.height);

                // แสดงข้อความบนจอภาพ
                ctx.save();
                ctx.translate(box.x + box.width, box.y);
                ctx.scale(-1, 1); 
                const label = isKnown ? `${result.label} (${matchPercent}%)` : "Unknown";
                ctx.font = 'bold 24px Kanit';
                const textWidth = ctx.measureText(label).width;
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, -35, textWidth + 10, 35);
                ctx.fillStyle = '#ffffff';
                ctx.fillText(label, 5, -10);
                ctx.restore();

                // [จุดเปลี่ยนสำคัญ 2] กรองเฉพาะผลลัพธ์ที่มั่นใจจริง ๆ เท่านั้น
                if (isKnown && result.distance <= 0.35) {
                    
                    // ส่วนที่ 1: แสดงแถบต้อนรับมุมขวาบน
                    if (!activeNames.has(result.label)) {
                        showNameHeader(result.label, matchPercent); 
                    }

                    // ส่วนที่ 2: ส่งแจ้งเตือน Line (Cooldown 1 นาทีต่อคน)
                    if (!lineCooldown.has(result.label)) {
                        lineCooldown.add(result.label);

                        fetch(WEB_APP_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            cache: 'no-cache',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: result.label })
                        });

                        setTimeout(() => {
                            lineCooldown.delete(result.label);
                        }, 60000); 
                    }
                }
            });
        }, 250); // ปรับวินาทีตรวจจับเป็น 250ms เพื่อลดภาระ CPU ในขณะภาพชัดขึ้น
    };

    function showNameHeader(name, percent) {
        if (activeNames.has(name)) return;
        activeNames.add(name);

        const toast = document.createElement('div');
        toast.className = 'name-toast';
        toast.innerHTML = `
            <div style="font-size: 14px; font-weight: normal;">ยินดีต้อนรับ</div>
            <div>${name}</div>
            <div style="font-size: 16px; font-weight: normal;">ความมั่นใจ: ${percent}%</div>
        `;
        nameContainer.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            toast.style.transition = '0.5s';
            setTimeout(() => {
                toast.remove();
                activeNames.delete(name);
            }, 500);
        }, 5000);
    }
</script>
</body>
</html>
